name: research-agent

on:
  schedule:
    # 14:00 UTC daily.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without opening PRs or mutating state"
        required: false
        type: boolean
        default: false
      force_run:
        description: "Force the agent to run even when the open-PR backoff would normally skip it"
        required: false
        type: boolean
        default: false
      model:
        description: "Override OPENROUTER_DRAFT_MODEL for this run only (e.g. anthropic/claude-haiku-4.5)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: research-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the agent can push branches.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git identity
        run: |
          git config user.name "ai-horrors-agent"
          git config user.email "agent@aihorrors.dev"

      - name: Install agent deps
        working-directory: agent
        run: bun install --frozen-lockfile

      # Restore the dedup ledger from the last run. Cache lives outside git so
      # branch protection on `main` doesn't block state persistence. The exact
      # key matches only the current run; restore-keys falls back to the most
      # recent prior run's cache.
      - name: Restore agent state
        uses: actions/cache/restore@v4
        with:
          path: agent/state/seen.json
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-

      - name: Run research agent
        working-directory: agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Per-run override (workflow_dispatch input) wins; otherwise fall back
          # to the repo-level Actions variable; otherwise let config.ts default.
          OPENROUTER_DRAFT_MODEL: ${{ github.event.inputs.model || vars.OPENROUTER_DRAFT_MODEL || '' }}
          OPENROUTER_TIEBREAK_MODEL: ${{ vars.OPENROUTER_TIEBREAK_MODEL || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          FORCE_RUN: ${{ github.event.inputs.force_run == 'true' && '1' || '0' }}
        run: bun run index.ts

      # Save the dedup ledger for the next run. `always()` so we persist even
      # when the agent step errors mid-run (partial state is still valid). The
      # dry_run gate prevents test runs from poisoning the cache.
      - name: Save agent state
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: agent/state/seen.json
          key: agent-state-${{ github.run_id }}
